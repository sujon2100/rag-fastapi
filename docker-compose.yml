services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  mcp-server:
    build: .
    init: true
    command: ["python", "-m", "app.mcp.server"]
    environment:
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=8001
    ports:
      - "8001:8001"

  api:
    build: .
    init: true
    depends_on:
      - ollama
      - mcp-server
    environment:
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - OLLAMA_BASE_URL=http://ollama:11434
      - MCP_SERVER_URL=http://mcp-server:8001/mcp
    ports:
      - "8000:8000"

volumes:
  ollama_data:
